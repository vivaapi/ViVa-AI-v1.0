# 工作流名称（自定义）
name: Auto Sync Upstream Repository

# 触发条件：定时触发 + 手动触发（方便测试）
on:
  # 定时触发（GitHub Actions默认使用UTC时区，北京时间=UTC+8，因此北京时间8点对应UTC 0点）
  schedule:
    - cron: '0 0 * * *'  # 格式：分 时 日 月 周，每天UTC 0点（北京时间8点）执行
  # 手动触发（在Actions页面可点击「Run workflow」手动执行）
  workflow_dispatch:

# 执行的任务
jobs:
  sync:
    # 运行环境：Ubuntu最新版
    runs-on: ubuntu-latest
    # 任务步骤
    steps:
      # 步骤1：检出你的Fork仓库代码到运行环境
      - name: Checkout your fork repository
        uses: actions/checkout@v4
        with:
          # 拉取完整历史（避免同步时冲突）
          fetch-depth: 0
          # 配置git身份（用于提交代码）
          persist-credentials: true

      # 步骤2：添加上游仓库（原仓库）为远程仓库
      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/vivaapi/ViVa-AI-v1.0.git
          # 拉取上游仓库的所有分支和标签
          git fetch upstream

      # 步骤3：同步上游仓库的main/master分支到你的Fork仓库（默认分支需确认）
      - name: Sync upstream changes to your fork
        run: |
          # 切换到你的Fork仓库的主分支（通常是main或master，需确认原仓库主分支名称）
          git checkout main  # 如果原仓库主分支是master，改为git checkout master
          # 合并上游主分支的代码（如果有冲突会失败，需手动处理）
          git merge upstream/main --no-edit  # 原仓库主分支是master则改为upstream/master
          # 拉取最新的上游代码（确保无遗漏）
          git pull upstream main --rebase  # 原仓库主分支是master则改为upstream/master

      # 步骤4：将同步后的代码推送到你的Fork仓库
      - name: Push changes to your fork
        run: |
          git push origin main  # 你的Fork仓库主分支是master则改为origin/master
        # 权限配置：需要GitHub Token来推送代码（GitHub自动生成的GITHUB_TOKEN已包含权限）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
